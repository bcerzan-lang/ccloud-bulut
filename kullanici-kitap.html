<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kullanıcı Kitabı | CloudKitap</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
</head>
<body class="reader-layout">
  <div class="reading-progress"><div class="reading-progress-fill" id="progressFill"></div></div>

  <header class="reader-topbar">
    <a href="kullanici-kitaplari.html" class="reader-back">← Kullanıcı Kitapları</a>
    <div class="reader-topbar-title" id="readerChapterTitle">Kullanıcı Kitabı</div>
    <div class="reader-topbar-controls" style="position:relative;">
      <button class="r-ctrl-btn" id="fontPanelBtn" onclick="toggleFontPanel()">Aa</button>
      <div class="font-panel" id="fontPanel">
        <div class="font-panel-row">
          <span class="font-panel-label">Yazı Boyutu</span>
          <span class="font-panel-label" id="fontSizeLabel">17px</span>
        </div>
        <div class="font-panel-row">
          <div class="font-btns">
            <button class="font-btn" onclick="changeFontSize(-1)">A−</button>
            <button class="font-btn" onclick="changeFontSize(1)">A+</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="reader-body">
    <article class="reader-paper">
      <div class="reader-chapter-header">
        <div class="reader-chapter-num" id="chapterNum">Kullanıcı Kitabı</div>
        <h1 class="reader-chapter-title" id="chapterTitle">Yükleniyor…</h1>
        <p class="reader-chapter-sub" id="chapterSub"></p>
      </div>
      <div class="reader-text" id="readerText"></div>

      <div style="margin-top:56px;padding-top:28px;border-top:1px solid var(--border);">
        <h2 style="font-size:18px;font-weight:800;margin-bottom:12px;">Yorumlar</h2>

        <div class="list-book-item" style="align-items:stretch;">
          <div class="list-book-info">
            <div style="display:grid;grid-template-columns:1fr;gap:10px;">
              <input id="cName" placeholder="Adın (opsiyonel)" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:10px;outline:none;"/>
              <textarea id="cBody" placeholder="Yorum yaz..." rows="4" style="width:100%;resize:vertical;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:10px;outline:none;"></textarea>
            </div>
            <div style="display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap;">
              <button class="btn-read" onclick="postComment()">Yorum gönder</button>
              <span id="cStatus" style="color:var(--text2);font-size:12px;font-weight:600;"></span>
            </div>
          </div>
        </div>

        <div class="chapter-list" id="commentsList" style="margin-top:14px;"></div>
      </div>
    </article>
  </div>

  <div class="tts-player" id="ttsPanel">
    <span class="tts-icon">🎧</span>
    <div class="tts-center">
      <div class="tts-label">
        <span>Sesli Okuma</span>
        <span id="ttsTimeLeft"></span>
      </div>
      <div class="tts-progress-bar">
        <div class="tts-progress-fill" id="ttsProgressFill"></div>
      </div>
    </div>
    <div class="tts-controls">
      <button class="tts-btn" onclick="ttsRewind()" title="Geri Al">⏮</button>
      <button class="tts-btn tts-play-main" id="ttsPlayBtn" onclick="ttsPlay()" title="Dinle" style="display:flex;">▶</button>
      <button class="tts-btn tts-play-main" id="ttsPauseBtn" onclick="ttsPause()" title="Duraklat" style="display:none;">⏸</button>
      <button class="tts-btn" onclick="ttsStop()" title="Durdur">⏹</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", async () => {
      await loadUserBookDetail();
    });
  </script>
</body>
</html>
